---
name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened,synchronize]

permissions:
  contents: read

jobs:
  CLAAssistant:
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: netcracker/qubership-workflow-hub/actions/cla-assistant@669-feat-cla-action-onboard-to-qubersip-actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://raw.githubusercontent.com/MyBorislavrOrg/cla-storage/refs/heads/main/CLA/cla.md'
          # branch should not be protected
          branch: 'main'
          allowlist: web-flow,bot*
          remote-repository-name: cla-storage
          # remote-organization-name: ${{ github.repository_owner }}
